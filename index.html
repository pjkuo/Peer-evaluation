<style>
:root{

  --coral:#E0654A; --amber:#E0A93F; --paper:#f3f7f4; --line:#d3e2da;
  --card:#ffffff; --muted:#6d8f82; --soft:#eef3f0;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft JhengHei","Noto Sans CJK TC",system-ui,"Segoe UI",sans-serif;}
body{background:var(--paper);color:var(--ink);padding:18px;line-height:1.5;}
.container{max-width:1440px;margin:0 auto;}
.header{background:linear-gradient(135deg,var(--ink),var(--green-d));color:#fff;padding:18px 22px;border-radius:22px;margin-bottom:18px;box-shadow:0 8px 24px rgba(22,56,42,.18);}
.header h2{font-size:1.35rem;letter-spacing:.5px;}
.header p{font-size:.82rem;opacity:.9;margin-top:6px;}
.bar{background:var(--card);border-radius:18px;padding:12px 18px;margin-bottom:12px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.04);}
.bar label{font-weight:700;font-size:.9rem;}
.bar input[type=text]{flex:1;min-width:170px;padding:8px 14px;border-radius:30px;border:1.5px solid var(--line);font-size:.95rem;}
.btn{border:none;border-radius:30px;padding:8px 18px;font-weight:700;cursor:pointer;font-size:.88rem;transition:transform .08s,box-shadow .15s;}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink);}
.btn-amber{background:var(--amber);color:#3a2c08;}
.btn-coral{background:#fff;color:var(--coral);border:1.5px solid #f2b8ab;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.chip{background:var(--soft);border-radius:30px;padding:5px 14px;font-size:.82rem;font-weight:600;display:inline-block;}
.chip.warn{background:#fff2ee;color:var(--coral);}
.chip.ok{background:#e8f5ee;color:var(--green-d);}
.chip.wait{background:#fff8e6;color:#9a7414;}
.statusbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);border-radius:18px;padding:12px 18px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.04);border-left:6px solid var(--green);}
.statusbar.closed{border-left-color:var(--coral);}
.role-switch{display:flex;justify-content:center;gap:14px;margin-bottom:18px;}
.role-btn{background:#fff;border:2px solid var(--ink);padding:9px 26px;border-radius:40px;font-weight:800;cursor:pointer;font-size:.95rem;}
.role-btn.active{background:var(--ink);color:#fff;}
.tabs{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:18px;}
.tab{background:#fff;border:none;padding:8px 22px;border-radius:40px;font-weight:700;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:.9rem;}
.tab.active{background:var(--green);color:#fff;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;margin-bottom:30px;}
.card{background:var(--card);border-radius:20px;padding:16px 18px;box-shadow:0 4px 14px rgba(0,0,0,.05);border-top:5px solid var(--teal);}
.card.mine{border-top-color:#b6c2bb;background:#f6f8f7;}
.card.locked{border-top-color:var(--amber);}
.group-name{font-weight:800;font-size:1.12rem;color:var(--ink);}
.group-topic{font-size:.74rem;background:var(--soft);display:inline-block;padding:3px 12px;border-radius:20px;margin:7px 0 8px;}
.members{font-size:.72rem;color:var(--muted);margin-bottom:10px;line-height:1.6;}
.members b{color:var(--green-d);}
.voted-avg{font-size:.78rem;color:var(--teal);margin:4px 0 10px;font-weight:600;}
.voted-avg.hidden-avg{color:#9a7414;}
.score-row{display:flex;gap:14px;margin:10px 0;flex-wrap:wrap;}
.score-item{flex:1;min-width:120px;}
.score-item label{display:block;font-weight:700;color:var(--teal);font-size:.78rem;margin-bottom:3px;}
.score-item input{width:100%;padding:7px;border-radius:30px;border:1.5px solid var(--line);text-align:center;font-size:.95rem;}
.bonus-area{margin:10px 0;display:flex;align-items:center;gap:10px;font-size:.85rem;}
.bonus-area select{padding:6px 12px;border-radius:30px;border:1.5px solid var(--line);}
.btn-submit{background:var(--green);color:#fff;border:none;width:100%;padding:10px;border-radius:30px;cursor:pointer;font-weight:800;font-size:.95rem;}
.btn-submit:disabled{background:#bcd2c6;cursor:not-allowed;}
.dashboard{display:none;}
.panel{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.05);margin-bottom:18px;}
.subtabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.subtab{background:var(--soft);border:none;padding:9px 20px;border-radius:30px;font-weight:700;cursor:pointer;font-size:.9rem;}
.subtab.active{background:var(--ink);color:#fff;}
.subpage{display:none;}
.subpage.active{display:block;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;}
.toolbar .spacer{flex:1;}
.seg{display:inline-flex;background:var(--soft);border-radius:30px;padding:3px;}
.seg button{border:none;background:transparent;padding:6px 14px;border-radius:30px;font-weight:700;cursor:pointer;font-size:.82rem;color:var(--muted);}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.12);}
table.tbl{width:100%;border-collapse:collapse;}
table.tbl th,table.tbl td{border:1px solid var(--line);padding:8px;text-align:center;font-size:.84rem;}
table.tbl th{background:var(--soft);position:sticky;top:0;font-weight:800;}
table.tbl tr.clickable{cursor:pointer;}
table.tbl tr.clickable:hover{background:#f0f7f2;}
.top3{background:#fff8e7;font-weight:800;}
.rank-badge{display:inline-block;width:24px;height:24px;line-height:24px;border-radius:50%;font-weight:800;color:#fff;background:var(--teal);}
.rank-badge.g1{background:var(--amber);} .rank-badge.g2{background:#9bb0bd;} .rank-badge.g3{background:var(--coral);}
.pending{color:var(--amber);font-size:.78rem;font-weight:700;}
.teacher-score-input{width:74px;padding:5px;border-radius:18px;border:1.5px solid var(--line);text-align:center;}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px;}
.kpi{background:linear-gradient(135deg,#fff,#f4f9f6);border:1px solid var(--line);border-radius:16px;padding:14px 16px;}
.kpi .n{font-size:1.7rem;font-weight:800;color:var(--green-d);}
.kpi .l{font-size:.78rem;color:var(--muted);margin-top:2px;}
.heatbar{height:10px;border-radius:6px;background:var(--soft);overflow:hidden;}
.heatbar i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--green));}
.missing-tag{display:inline-block;background:#fff2ee;color:var(--coral);border-radius:14px;padding:1px 7px;font-size:.72rem;margin:1px;}
.chart-wrap{display:grid;grid-template-columns:1fr;gap:22px;}
@media(min-width:900px){.chart-wrap{grid-template-columns:1.3fr 1fr;}}
.chart-box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;}
.chart-box h4{font-size:.95rem;margin-bottom:8px;color:var(--ink);}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(22,56,42,.45);z-index:50;align-items:center;justify-content:center;padding:18px;}
.modal-mask.show{display:flex;}
.modal{background:#fff;border-radius:20px;max-width:760px;width:100%;max-height:86vh;overflow:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{margin-bottom:4px;}
.modal .close{float:right;border:none;background:var(--soft);border-radius:50%;width:34px;height:34px;font-size:1.1rem;cursor:pointer;}
.footnote{margin-top:26px;color:var(--muted);font-size:.72rem;line-height:1.8;background:#fff;border-radius:16px;padding:16px 20px;}
.footnote code{background:var(--soft);padding:1px 6px;border-radius:6px;}
.warn{color:var(--coral);font-weight:700;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🎓 期末報告同學互評系統 v4</h2>
    <p>名單白名單驗證・自動防自評・去極值防弊計分・即時雲端同步・教師分析儀表板（Excel／圖表／進度／明細）</p>
  </div>

  <!-- 身分列 -->
  <div class="bar">
    <label>🔑 你的學號（<span style="color:var(--coral);">英文字大寫</span>）：</label>
    <input type="text" id="studentIdInput" placeholder="例：B11431005（英文字母請大寫，須在名單內）" style="text-transform:uppercase;">
    <button id="setStudentIdBtn" class="btn btn-primary">設定學號</button>
    <span id="identityChip" class="chip">尚未設定</span>
  </div>

  <!-- 評分狀態橫幅 -->
  <div class="statusbar" id="statusBar">
    <span id="scoreStateChip" class="chip ok">🔓 評分開放中</span>
    <span id="revealNote" style="font-size:.82rem;color:var(--muted);">評分進行中，各組即時平均分將於截止後公布。</span>
    <span id="connChip" class="chip wait" style="margin-left:auto;">⏳ 連線中…</span>
  </div>

  <div class="role-switch">
    <button class="role-btn active" id="studentRoleBtn">✍️ 學生評分區</button>
    <button class="role-btn" id="dashboardRoleBtn">📈 教師儀表板</button>
  </div>

  <!-- 學生評分區 -->
  <div id="studentPanel">
    <div class="tabs" id="deptTabs"></div>
    <div class="toolbar" style="justify-content:flex-end;">
      <button id="refreshBtn" class="btn btn-ghost">🔄 強制同步</button>
    </div>
    <div id="cardsContainer" class="cards-grid">載入中…</div>
  </div>

  <!-- 教師儀表板 -->
  <div id="dashboardPanel" class="dashboard">
    <div class="panel">
      <div class="toolbar">
        <button id="toggleScoringBtn" class="btn btn-amber">🔓 目前：開放評分（點此截止）</button>
        <span class="chip">計分方式</span>
        <span class="seg" id="meanSeg">
          <button data-mode="trim" class="on">去極值平均</button>
          <button data-mode="plain">一般平均</button>
        </span>
        <span class="spacer"></span>
        <button id="exportXlsxBtn" class="btn btn-green">📊 匯出 Excel（總表＋分頁）</button>
        <button id="exportCsvBtn" class="btn btn-ghost">📎 匯出 CSV</button>
        <button id="clearAllDataBtn" class="btn btn-coral">🗑️ 清除所有評分</button>
      </div>
      <div class="subtabs">
        <button class="subtab active" data-sub="rank">🏆 排名總表</button>
        <button class="subtab" data-sub="progress">📋 進度監控</button>
        <button class="subtab" data-sub="charts">📈 圖表分析</button>
      </div>

      <!-- 排名總表 -->
      <div class="subpage active" id="sub-rank">
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px;">
          💡 加權＝學生平均×80%＋教師×20%。可直接修改「教師評分」欄即時更新。<span class="warn">點任一列</span>可下鑽查看每位評分者的分數。</p>
        <div id="rankTableContainer"></div>
      </div>

      <!-- 進度監控 -->
      <div class="subpage" id="sub-progress">
        <div class="kpi-row" id="kpiRow"></div>
        <h4 style="margin:6px 0 10px;">🔥 各組收件熱度</h4>
        <div id="heatContainer"></div>
        <h4 style="margin:18px 0 10px;">📝 未完成評分名單（同系內未評遍其他各組者）</h4>
        <div id="unratedContainer"></div>
      </div>

      <!-- 圖表分析 -->
      <div class="subpage" id="sub-charts">
        <div class="chart-wrap">
          <div class="chart-box"><h4>加權總分排名（長條圖）</h4><canvas id="barChart" height="320"></canvas></div>
          <div class="chart-box"><h4>科系綜合表現（雷達圖）</h4><canvas id="radarChart" height="320"></canvas></div>
        </div>
        <p style="font-size:.74rem;color:var(--muted);margin-top:12px;">雷達圖維度已標準化至 0~5：書面均、上台均、加分率（×5）、教師均（÷2）、加權均（÷2）。</p>
      </div>
    </div>
  </div>

  <div class="footnote" id="footnote"></div>
</div>

<!-- 下鑽明細 Modal -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <button class="close" id="modalClose">×</button>
    <h3 id="modalTitle">評分明細</h3>
    <p id="modalSub" style="font-size:.82rem;color:var(--muted);margin-bottom:12px;"></p>
    <div id="modalBody"></div>
  </div>
</div>

/* ====== 核心邏輯(與 Node 測試同一份) ====== */
/* ============================================================
   核心邏輯(純函式)— 期末互評系統 v4
   同一份程式碼同時用於 Node 測試與瀏覽器端,確保計算一致。
   ============================================================ */

const WRITTEN_MAX = 5, ORAL_MAX = 5, TEACHER_MAX = 10, STUDENT_MAX = 10.5;

function sanitizeId(id) {
  return String(id).trim().replace(/[\/.#$\[\]\s]/g, "_");
}
function isHalfStep(v) { return Math.abs(v * 2 - Math.round(v * 2)) < 1e-9; }

// 去極值平均:資料數 >=4 時去掉一個最高、一個最低後平均;否則一般平均
function trimmedMean(values) {
  if (!values.length) return null;
  if (values.length >= 4) {
    const s = [...values].sort((a, b) => a - b);
    s.shift(); s.pop();
    return s.reduce((a, b) => a + b, 0) / s.length;
  }
  return values.reduce((a, b) => a + b, 0) / values.length;
}
function plainMean(values) {
  if (!values.length) return null;
  return values.reduce((a, b) => a + b, 0) / values.length;
}

// 將 ROSTER_RAW [[sid,name,dept,gid,leader],...] 轉為 Map(sid -> {name,dept,gid,leader})
function buildRosterMap(raw) {
  const m = new Map();
  for (const [sid, name, dept, gid, leader] of raw) {
    m.set(sanitizeId(sid), { sid, name, dept, gid: String(gid), leader: !!leader });
  }
  return m;
}

// 單組統計;useTrimmed 控制 avg 是否採去極值
function getGroupStats(allRatings, dept, groupId, useTrimmed) {
  const f = allRatings.filter(r => r.dept === dept && r.groupId === groupId);
  if (f.length === 0)
    return { avg: null, rawAvg: null, trimmedAvg: null, count: 0, writtenAvg: null, oralAvg: null, bonusCount: 0 };
  const totals = f.map(r => r.totalScore);
  const rawAvg = plainMean(totals);
  const trimmedAvg = trimmedMean(totals);
  const writtenAvg = plainMean(f.map(r => r.written || 0));
  const oralAvg = plainMean(f.map(r => r.oral || 0));
  const bonusCount = f.filter(r => (r.bonus || 0) > 0).length;
  return {
    avg: useTrimmed ? trimmedAvg : rawAvg,
    rawAvg, trimmedAvg, count: f.length, writtenAvg, oralAvg, bonusCount
  };
}

// 加權:學生均 80% + 教師 20%;缺教師分時以學生均排序並標 pending
function computeRow(g, allRatings, teacherScores, useTrimmed) {
  const stats = getGroupStats(allRatings, g.dept, g.id, useTrimmed);
  const key = `${g.dept}_${g.id}`;
  const hasTeacher = teacherScores.has(key);
  const teacherScore = hasTeacher ? teacherScores.get(key) : null;
  let finalScore = null, rankKey = -1, pending = false;
  if (stats.avg !== null && hasTeacher) { finalScore = stats.avg * 0.8 + teacherScore * 0.2; rankKey = finalScore; }
  else if (stats.avg !== null) { rankKey = stats.avg; pending = true; }
  else if (hasTeacher) { rankKey = teacherScore; pending = true; }
  return { dept: g.dept, id: g.id, title: g.title, stats, hasTeacher, teacherScore, finalScore, rankKey, pending };
}

function buildRows(groupsData, allRatings, teacherScores, useTrimmed) {
  return groupsData
    .map(g => computeRow(g, allRatings, teacherScores, useTrimmed))
    .sort((a, b) => b.rankKey - a.rankKey);
}

// 各組收件熱度
function groupHeat(groupsData, allRatings) {
  return groupsData.map(g => ({
    dept: g.dept, id: g.id, title: g.title,
    count: allRatings.filter(r => r.dept === g.dept && r.groupId === g.id).length
  }));
}

// 進度監控:以「同系內、評遍其他各組」為完成標準
// 回傳 { total, byDept:[{dept,expectedPer,students:[{sid,name,gid,done,expected,missing:[gid...]}]}], unrated:[...] }
function computeProgress(rosterMap, groupsData, allRatings) {
  // 每系的組別 id 清單
  const deptGroups = {};
  for (const g of groupsData) (deptGroups[g.dept] = deptGroups[g.dept] || []).push(g.id);

  // 每位學生已評的 (dept_gid) 集合
  const votedBy = new Map(); // sid -> Set("dept_gid")
  for (const r of allRatings) {
    const sid = r.studentKey;
    if (!votedBy.has(sid)) votedBy.set(sid, new Set());
    votedBy.get(sid).add(`${r.dept}_${r.groupId}`);
  }

  const byDept = {};
  const unrated = [];
  let total = allRatings.length;

  for (const [sid, info] of rosterMap.entries()) {
    const peers = (deptGroups[info.dept] || []).filter(gid => gid !== info.gid); // 同系、非本組
    const voted = votedBy.get(sid) || new Set();
    const missing = peers.filter(gid => !voted.has(`${info.dept}_${gid}`));
    const done = peers.length - missing.length;
    const rec = { sid: info.sid, name: info.name, gid: info.gid, done, expected: peers.length, missing };
    if (!byDept[info.dept]) byDept[info.dept] = { dept: info.dept, expectedPer: peers.length, students: [] };
    byDept[info.dept].students.push(rec);
    if (missing.length > 0) unrated.push({ dept: info.dept, ...rec });
  }
  // 排序:未評多的在前
  for (const d in byDept) byDept[d].students.sort((a, b) => (b.expected - b.done) - (a.expected - a.done) || a.sid.localeCompare(b.sid));
  unrated.sort((a, b) => (b.expected - b.done) - (a.expected - a.done) || a.dept.localeCompare(b.dept) || a.sid.localeCompare(b.sid));

  return { total, byDept, unrated };
}

// 科系雷達圖資料:每系在 [書面均,上台均,加分率,教師均,加權均] 的平均(0~~標準化前的原值)
function deptRadarData(groupsData, allRatings, teacherScores, useTrimmed) {
  const depts = [...new Set(groupsData.map(g => g.dept))];
  const out = {};
  for (const dept of depts) {
    const rows = groupsData.filter(g => g.dept === dept).map(g => computeRow(g, allRatings, teacherScores, useTrimmed));
    const withData = rows.filter(r => r.stats.count > 0);
    const avg = (arr) => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0;
    out[dept] = {
      written: avg(withData.map(r => r.stats.writtenAvg || 0)),
      oral: avg(withData.map(r => r.stats.oralAvg || 0)),
      bonusRate: avg(withData.map(r => r.stats.count ? r.stats.bonusCount / r.stats.count : 0)) * 5, // 0~5 視覺尺度
      teacher: avg(rows.filter(r => r.hasTeacher).map(r => r.teacherScore)) / 2, // 0~10 -> 0~5
      weighted: avg(rows.filter(r => r.finalScore !== null).map(r => r.finalScore)) / 2 // 0~10 -> 0~5
    };
  }
  return out;
}

async function submitScore(dept,gid,written,oral,bonus){

  const sid=sanitizeId(currentStudentId), total=written+oral+bonus;

    await setDoc(doc(db,"ratings",`${sid}_${dept}_${gid}`),{
      studentKey:sid, studentId:currentStudentId, studentName:myName, uid:currentUser.uid,

function listenFirestore(){

  if(configUnsub){configUnsub();configUnsub=null;}
  ratingsUnsub=onSnapshot(collection(db,"ratings"),snap=>{
    allRatings=[];
    snap.forEach(d=>{const x=d.data();allRatings.push({
      studentKey:x.studentKey||sanitizeId(x.studentId||x.uid||""),
      studentId:x.studentId||"", studentName:x.studentName||"",
      dept:x.dept, groupId:x.groupId, written:x.written, oral:x.oral, bonus:x.bonus,
      totalScore:x.totalScore, timestamp:x.timestamp&&x.timestamp.toDate?x.timestamp.toDate():null
    });});
    if(studentPanel.style.display!=="none") renderStudentCards();
    if(dashboardPanel.style.display!=="none") renderDashboard();
  },err=>{console.error(err);connChip.className="chip warn";connChip.innerText="❌ 讀取失敗:"+err.code;});

  teacherUnsub=onSnapshot(collection(db,"teacherScores"),snap=>{
    teacherScores.clear();
    snap.forEach(d=>{const x=d.data();if(x.score!==null&&x.score!==undefined)teacherScores.set(`${x.dept}_${x.groupId}`,x.score);});
    if(dashboardPanel.style.display!=="none") renderDashboard();
  },err=>console.error(err));

  configUnsub=onSnapshot(doc(db,"config","settings"),snap=>{
    const d=snap.data();
    scoringOpen = d ? (d.scoringOpen!==false) : true;
    refreshScoreState();
    if(studentPanel.style.display!=="none") renderStudentCards();
    if(dashboardPanel.style.display!=="none") renderDashboard();
  },err=>console.error(err));
}

    chip.className="chip ok"; chip.innerText="🔓 評分開放中"; sbar.classList.remove("closed");

    if(tbtn){tbtn.className="btn btn-amber";tbtn.innerText="🔓 目前:開放評分(點此截止)";}
  }else{

    note.innerText="評分已截止並鎖定,平均分已公布。";

function renderDeptTabs(){

function renderStudentCards(){
  const groups=groupsData.filter(g=>g.dept===currentDept);
  cardsContainer.innerHTML=groups.map(g=>{
    const voted=hasUserVoted(g.dept,g.id), mine=isMyGroup(g.dept,g.id);
    const st=getGroupStats(allRatings,g.dept,g.id,false); // 學生端一律看一般均(且僅截止後)
    let avgTxt, avgCls="voted-avg";
    if(scoringOpen){ avgTxt = st.count>0?`目前 ${st.count} 人已評・平均截止後公布`:"尚無人評分"; avgCls+=" hidden-avg"; }
    else { avgTxt = st.rawAvg!==null?`${st.count} 人評分・平均 ${st.rawAvg.toFixed(2)} / 10.5`:"無人評分"; }
    const mem=(membersOf[`${g.dept}_${g.id}`]||[]);
    const memTxt=mem.length?`組員：`+mem.map(m=>`${m.leader?'<b>'+escapeHtml(m.name)+'(組長)</b>':escapeHtml(m.name)}`).join("、"):"";
    const lockedByClose=!scoringOpen;
    const disabled=voted||mine||lockedByClose||!currentStudentId;
    let label="📤 送出評分", cls="card";
    if(mine){label="🚫 本組(不可自評)";cls+=" mine";}
    else if(voted){label="✓ 已評分";}
    else if(lockedByClose){label="🔒 評分已截止";cls+=" locked";}
    else if(!currentStudentId){label="請先設定學號";}
    return `<div class="${cls}">
      <div class="group-name">📌 第 ${escapeHtml(g.id)} 組</div>
      <div class="group-topic">${escapeHtml(g.title)}</div>
      ${memTxt?`<div class="members">${memTxt}</div>`:""}
      <div class="${avgCls}">${avgTxt}</div>
      <div class="score-row">
        <div class="score-item"><label>📄 書面報告 (0~5)</label><input type="number" step="0.5" min="0" max="5" class="written-input" ${disabled?'disabled':''}></div>
        <div class="score-item"><label>🎤 上台報告 (0~5)</label><input type="number" step="0.5" min="0" max="5" class="oral-input" ${disabled?'disabled':''}></div>
      </div>
      <div class="bonus-area"><span>➕ 加分：</span>
        <select class="bonus-select" ${disabled?'disabled':''}>
          <option value="0">無加分 (0)</option><option value="0.5">有加分 (+0.5)</option>
        </select></div>
      <button class="btn-submit" data-dept="${escapeHtml(g.dept)}" data-id="${escapeHtml(g.id)}" ${disabled?'disabled':''}>${label}</button>
    </div>`;
  }).join("");
  cardsContainer.querySelectorAll(".btn-submit:not([disabled])").forEach(btn=>{
    btn.addEventListener("click",async()=>{
      const card=btn.closest(".card");
      const written=parseFloat(card.querySelector(".written-input").value);
      const oral=parseFloat(card.querySelector(".oral-input").value);
      const bonus=parseFloat(card.querySelector(".bonus-select").value);
      if(isNaN(written)||isNaN(oral)){alert("請填寫書面與上台分數");return;}
      if(written<0||written>5||oral<0||oral>5){alert("分數需在 0~5 之間");return;}
      if(!isHalfStep(written)||!isHalfStep(oral)){alert("分數需為 0.5 的倍數");return;}
      btn.disabled=true;
      const okk=await submitScore(btn.dataset.dept,btn.dataset.id,written,oral,bonus);
      if(!okk) btn.disabled=false;
    });
  });
}

/* ====== 教師：排名總表 ====== */
function renderRankTable(){
  const act=document.activeElement; let saved=null;
  if(act&&act.classList&&act.classList.contains("teacher-score-input"))
    saved={dept:act.dataset.dept,id:act.dataset.id,value:act.value,selStart:act.selectionStart};
  const rows=buildRows(groupsData,allRatings,teacherScores,useTrimmed);
  const meanLabel=useTrimmed?"學生均(去極值)":"學生均(一般)";
  let html=`<table class="tbl"><thead><tr>
    <th>排名</th><th>科系</th><th>組別</th><th>主題</th><th>書面均</th><th>上台均</th><th>加分數</th>
    <th>${meanLabel}/10.5</th><th>教師(0~10)</th><th>加權總分</th><th>評分人數</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const rankable=!r.pending&&r.finalScore!==null;
    const top=(rankable&&i<3)?'top3':'';
    const badge=i===0?'g1':i===1?'g2':i===2?'g3':'';
    const finalCell=r.finalScore!==null?`<strong>${r.finalScore.toFixed(2)}</strong>`:(r.pending?`<span class="pending">待教師評分</span>`:'—');
    html+=`<tr class="clickable ${top}" data-dept="${escapeHtml(r.dept)}" data-id="${escapeHtml(r.id)}">
      <td><span class="rank-badge ${badge}">${i+1}</span></td>
      <td>${escapeHtml(r.dept)}</td><td>第${escapeHtml(r.id)}組</td>
      <td style="text-align:left;">${escapeHtml(r.title)}</td>
      <td>${r.stats.writtenAvg!==null?r.stats.writtenAvg.toFixed(2):'—'}</td>
      <td>${r.stats.oralAvg!==null?r.stats.oralAvg.toFixed(2):'—'}</td>
      <td>${r.stats.bonusCount}</td>
      <td>${r.stats.avg!==null?r.stats.avg.toFixed(2):'無'}</td>
      <td><input type="number" step="0.5" min="0" max="10" class="teacher-score-input" data-dept="${escapeHtml(r.dept)}" data-id="${escapeHtml(r.id)}" value="${r.hasTeacher?r.teacherScore:''}" placeholder="0~10" onclick="event.stopPropagation()"></td>
      <td>${finalCell}</td><td>${r.stats.count}</td></tr>`;
  });
  html+=`</tbody></table>`;
  rankContainer.innerHTML=html;
  rankContainer.querySelectorAll(".teacher-score-input").forEach(inp=>{
    inp.addEventListener("change",()=>{
      let v=parseFloat(inp.value);
      if(inp.value.trim()===""||isNaN(v)) v=null;
      else{ if(v<0)v=0; if(v>10)v=10; if(!isHalfStep(v)){alert("教師評分需為 0.5 的倍數");return;} }
      saveTeacherScore(inp.dataset.dept,inp.dataset.id,v);
    });
  });
  rankContainer.querySelectorAll("tr.clickable").forEach(tr=>{
    tr.addEventListener("click",()=>openDrillDown(tr.dataset.dept,tr.dataset.id));
  });
  if(saved){
    const el=rankContainer.querySelector(`.teacher-score-input[data-dept="${CSS.escape(saved.dept)}"][data-id="${CSS.escape(saved.id)}"]`);
    if(el){el.value=saved.value;el.focus();try{el.setSelectionRange(saved.selStart,saved.selStart);}catch(e){}}
  }
}

/* ====== 教師：下鑽明細 ====== */
function openDrillDown(dept,gid){
  const list=allRatings.filter(r=>r.dept===dept&&r.groupId===gid)
    .sort((a,b)=>b.totalScore-a.totalScore);
  $("modalTitle").innerText=`📊 ${dept} 第${gid}組 — ${titleOf(dept,gid)}`;
  const st=getGroupStats(allRatings,dept,gid,useTrimmed);
  $("modalSub").innerHTML=list.length
    ? `評分人數 ${st.count} ｜ 一般平均 ${st.rawAvg.toFixed(2)} ｜ 去極值平均 ${st.trimmedAvg.toFixed(2)}（目前排名採${useTrimmed?'去極值':'一般'}）`
    : "目前尚無人評分。";
  if(!list.length){ $("modalBody").innerHTML=`<p style="color:var(--muted);">—</p>`; }
  else{
    const max=Math.max(...list.map(r=>r.totalScore)), min=Math.min(...list.map(r=>r.totalScore));
    let h=`<table class="tbl"><thead><tr><th>#</th><th>評分者</th><th>學號</th><th>書面</th><th>上台</th><th>加分</th><th>總分</th><th>時間</th></tr></thead><tbody>`;
    list.forEach((r,i)=>{
      const nm=r.studentName||(rosterMap.get(r.studentKey)?rosterMap.get(r.studentKey).name:"—");
      const extreme=(useTrimmed&&list.length>=4&&(r.totalScore===max||r.totalScore===min))?'style="background:#fff2ee;"':'';
      const t=r.timestamp?`${r.timestamp.getMonth()+1}/${r.timestamp.getDate()} ${String(r.timestamp.getHours()).padStart(2,'0')}:${String(r.timestamp.getMinutes()).padStart(2,'0')}`:'—';
      h+=`<tr ${extreme}><td>${i+1}</td><td>${escapeHtml(nm)}</td><td>${escapeHtml(r.studentId||r.studentKey)}</td>
        <td>${(r.written??'—')}</td><td>${(r.oral??'—')}</td><td>${(r.bonus?'+'+r.bonus:'0')}</td>
        <td><strong>${r.totalScore.toFixed(1)}</strong></td><td>${t}</td></tr>`;
    });
    h+=`</tbody></table>`;
    if(useTrimmed&&list.length>=4) h+=`<p style="font-size:.74rem;color:var(--coral);margin-top:8px;">淡紅底：去極值計分時被剔除的最高／最低分。</p>`;
    $("modalBody").innerHTML=h;
  }
  $("modalMask").classList.add("show");
}

/* ====== 教師：進度監控 ====== */
function renderProgress(){
  const prog=computeProgress(rosterMap,groupsData,allRatings);
  const heat=groupHeat(groupsData,allRatings);
  const totalStudents=rosterMap.size;
  const doneStudents=Object.values(prog.byDept).reduce((a,d)=>a+d.students.filter(s=>s.done===s.expected&&s.expected>0).length,0);
  const maxHeat=Math.max(1,...heat.map(h=>h.count));
  $("kpiRow").innerHTML=`
    <div class="kpi"><div class="n">${prog.total}</div><div class="l">總收件數(評分筆數)</div></div>
    <div class="kpi"><div class="n">${doneStudents}/${totalStudents}</div><div class="l">完成評分人數(同系評遍)</div></div>
    <div class="kpi"><div class="n">${groupsData.length}</div><div class="l">參賽組數</div></div>
    <div class="kpi"><div class="n">${prog.unrated.length}</div><div class="l">尚未完成人數</div></div>`;
  // 熱度(依科系分群)
  let hh="";
  for(const dept of DEPTS){
    hh+=`<div style="font-weight:800;margin:10px 0 6px;color:var(--green-d);">${escapeHtml(dept)}</div>`;
    hh+=`<table class="tbl"><thead><tr><th style="width:60px;">組別</th><th style="text-align:left;">主題</th><th style="width:70px;">收件</th><th style="width:40%;">熱度</th></tr></thead><tbody>`;
    heat.filter(h=>h.dept===dept).forEach(h=>{
      hh+=`<tr><td>第${escapeHtml(h.id)}組</td><td style="text-align:left;">${escapeHtml(h.title)}</td><td><strong>${h.count}</strong></td>
        <td><div class="heatbar"><i style="width:${Math.round(h.count/maxHeat*100)}%"></i></div></td></tr>`;
    });
    hh+=`</tbody></table>`;
  }
  $("heatContainer").innerHTML=hh;
  // 未完成名單
  let uu="";
  for(const dept of DEPTS){
    const d=prog.byDept[dept]; if(!d) continue;
    const pend=d.students.filter(s=>s.missing.length>0);
    uu+=`<div style="font-weight:800;margin:10px 0 6px;color:var(--green-d);">${escapeHtml(dept)} — 應評 ${d.expectedPer} 組／未完成 ${pend.length} 人</div>`;
    if(!pend.length){ uu+=`<div class="chip ok" style="margin-bottom:8px;">✅ 全班已完成</div>`; continue; }
    uu+=`<table class="tbl"><thead><tr><th>學號</th><th>姓名</th><th>本組</th><th>進度</th><th style="text-align:left;">未評組別</th></tr></thead><tbody>`;
    pend.forEach(s=>{
      const tags=s.missing.map(g=>`<span class="missing-tag">第${escapeHtml(g)}組</span>`).join("");
      uu+=`<tr><td>${escapeHtml(s.sid)}</td><td>${escapeHtml(s.name)}</td><td>第${escapeHtml(s.gid)}組</td>
        <td>${s.done}/${s.expected}</td><td style="text-align:left;">${tags}</td></tr>`;
    });
    uu+=`</tbody></table>`;
  }
  $("unratedContainer").innerHTML=uu;
}

/* ====== 匯出 Excel(總表＋各科系分頁＋明細) ====== */
function rowsForExport(){
  return buildRows(groupsData,allRatings,teacherScores,useTrimmed).map((r,i)=>({
    排名:i+1, 科系:r.dept, 組別:`第${r.id}組`, 主題:r.title,
    書面均:r.stats.writtenAvg!==null?+r.stats.writtenAvg.toFixed(2):"",
    上台均:r.stats.oralAvg!==null?+r.stats.oralAvg.toFixed(2):"",
    加分數:r.stats.bonusCount,
    "學生均(一般)":r.stats.rawAvg!==null?+r.stats.rawAvg.toFixed(2):"",
    "學生均(去極值)":r.stats.trimmedAvg!==null?+r.stats.trimmedAvg.toFixed(2):"",
    採用均:r.stats.avg!==null?+r.stats.avg.toFixed(2):"",
    "教師(0~10)":r.hasTeacher?r.teacherScore:"未評",
    加權總分:r.finalScore!==null?+r.finalScore.toFixed(2):"待教師",
    評分人數:r.stats.count,
    狀態:r.finalScore!==null?"完整":(r.pending?"待教師評分":"無資料"),
    _dept:r.dept
  }));
}
function exportXlsx(){
  if(typeof XLSX==="undefined"){ alert("Excel 元件載入失敗,請檢查網路(jsdelivr)後重試,或改用 CSV。"); return; }
  const all=rowsForExport();
  const strip=o=>{const{_dept,...rest}=o;return rest;};
  const wb=XLSX.utils.book_new();
  // 總表
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(all.map(strip)),"總表");
  // 各科系分頁(各自重新排名)
  for(const dept of DEPTS){
    const sub=all.filter(r=>r._dept===dept).map((r,i)=>{const o=strip(r);o.排名=i+1;return o;});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(sub),dept);
  }
  // 評分明細(逐筆)
  const detail=allRatings.map(r=>({
    科系:r.dept, 組別:`第${r.groupId}組`, 主題:titleOf(r.dept,r.groupId),
    評分者學號:r.studentId||r.studentKey,
    評分者姓名:r.studentName||(rosterMap.get(r.studentKey)?rosterMap.get(r.studentKey).name:""),
    書面:r.written, 上台:r.oral, 加分:r.bonus, 總分:r.totalScore,
    時間:r.timestamp?r.timestamp.toLocaleString("zh-TW"):""
  })).sort((a,b)=>a.科系.localeCompare(b.科系)||a.組別.localeCompare(b.組別));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(detail.length?detail:[{提示:"尚無評分資料"}]),"評分明細");
  // 未完成名單
  const prog=computeProgress(rosterMap,groupsData,allRatings);
  const un=prog.unrated.map(s=>({科系:s.dept,學號:s.sid,姓名:s.name,本組:`第${s.gid}組`,
    已評:s.done,應評:s.expected,未評組別:s.missing.map(g=>`第${g}組`).join("、")}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(un.length?un:[{提示:"全班皆已完成"}]),"未完成名單");
  const stamp=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`期末互評結果_${stamp}.xlsx`);
}
function exportCsv(){
  const all=rowsForExport();
  const cols=["排名","科系","組別","主題","書面均","上台均","加分數","學生均(一般)","學生均(去極值)","採用均","教師(0~10)","加權總分","評分人數","狀態"];
  const lines=[cols.join(",")].concat(all.map(r=>cols.map(c=>`"${String(r[c]??"").replace(/"/g,'""')}"`).join(",")));
  const blob=new Blob(["\uFEFF"+lines.join("\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="期末互評結果.csv";a.click();URL.revokeObjectURL(a.href);
}

/* ====== 清除 ====== */
async function clearAllData(){
  if(!isTeacherAuthed){ alert("請先以教師帳號登入。"); return; }
  if(!confirm("⚠️ 將永久刪除雲端所有評分(不含名單),無法復原。確定?")) return;
  try{
    let batch=writeBatch(db),n=0;
    const rs=await getDocs(collection(db,"ratings"));
    for(const s of rs.docs){batch.delete(doc(db,"ratings",s.id));if(++n%450===0){await batch.commit();batch=writeBatch(db);}}
    const tp=await getDocs(collection(db,"teacherScores"));
    for(const s of tp.docs){batch.delete(doc(db,"teacherScores",s.id));if(++n%450===0){await batch.commit();batch=writeBatch(db);}}
    await batch.commit();
    alert("✅ 已清除所有評分資料。");
  }catch(err){console.error(err);alert("清除失敗:"+err.message+permHint(err));}
}

  }));
  $("meanSeg").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
    useTrimmed=b.dataset.mode==="trim";
    $("meanSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
    renderDashboard();
  }));
}

/* ====== 連線 ====== */
function initAuth(){
  connChip.className="chip wait"; connChip.innerText="⏳ 連線中…";
  signInAnonymously(auth).catch(err=>{console.error(err);connChip.className="chip warn";connChip.innerText="❌ 連線失敗";});
  onAuthStateChanged(auth,user=>{
    if(user){
      currentUser=user; authReady=true;
      if(!isTeacherAuthed){connChip.className="chip ok";connChip.innerText="✅ 已連線";}
      listenFirestore(); renderDeptTabs();
      if(dashboardPanel.style.display!=="none") renderDashboard(); else renderStudentCards();
    }else{ authReady=false; connChip.className="chip warn"; connChip.innerText="⚠️ 未連線"; }
  });
}
function initUI(){
  renderDeptTabs();
  $("setStudentIdBtn").addEventListener("click",setStudentId);
  $("studentIdInput").addEventListener("keydown",e=>{if(e.key==="Enter")setStudentId();});
  $("studentIdInput").addEventListener("input",e=>{
    const p=e.target.selectionStart; e.target.value=e.target.value.toUpperCase();
    try{e.target.setSelectionRange(p,p);}catch(_){}
  });
  $("studentRoleBtn").addEventListener("click",switchToStudent);
  $("dashboardRoleBtn").addEventListener("click",switchToTeacher);
  $("refreshBtn").addEventListener("click",forceRefresh);
  $("toggleScoringBtn").addEventListener("click",()=>{ if(!isTeacherAuthed){alert("請先以教師身分登入。");return;} setScoringOpen(!scoringOpen); });
  $("exportXlsxBtn").addEventListener("click",exportXlsx);
  $("exportCsvBtn").addEventListener("click",exportCsv);
  $("clearAllDataBtn").addEventListener("click",clearAllData);
  $("modalClose").addEventListener("click",()=>$("modalMask").classList.remove("show"));
  $("modalMask").addEventListener("click",e=>{if(e.target===$("modalMask"))$("modalMask").classList.remove("show");});
  initSubTabs();
  refreshScoreState();
  renderFootnote();
  switchToStudent();
}
function renderFootnote(){
  $("footnote").innerHTML=`
  ✅ <b>計分規則</b>：書面 0~5（問題定義1＋IPO2＋技術實作2）＋ 上台 0~5（AI創新1＋成果展示3＋問答1）＋ 加分 0/0.5，學生分上限 10.5；教師 0~10；<b>加權＝學生均×80%＋教師×20%</b>。<br>
  ✅ <b>防弊</b>：① 僅名單內 ${rosterMap.size} 位學號可評分（白名單）② 系統自動帶入本組並禁止自評 ③ 一人一票（同學號重送覆蓋同筆）④ 去極值平均（≥4 筆去最高最低）⑤ 評分中隱藏即時均分，<span class="warn">教師截止後才公布</span>。<br>
  ✅ <b>Firestore 規則</b>：教師需可寫入 <code>ratings</code>、<code>teacherScores</code>、<code>config</code>；學生可讀全部、可寫自己的 <code>ratings</code>。教師帳號 Email 須為 <code>${TEACHER_EMAIL}</code> 並在 Authentication 啟用「電子郵件/密碼」。<br>
  ✅ <b>教師功能</b>：排名總表（點列下鑽看每位評分者）、進度監控（收件數／熱度／未完成名單）、圖表分析（長條圖＋科系雷達圖）、匯出 Excel（總表＋各科系分頁＋明細＋未完成名單）。`;
}

initAuth();
initUI();
</script>
